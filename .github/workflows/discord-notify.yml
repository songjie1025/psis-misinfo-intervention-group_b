name: Discord Notifications

on:
  push:
  create:
  delete:
  pull_request:
    types: [opened, closed, reopened]
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Notify Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "push" ]; then

            BRANCH="${{ github.ref_name }}"
            AUTHOR="${{ github.actor }}"
            MESSAGE="${{ github.event.head_commit.message }}"

            CONTENT=" **Neuer Commit**
             Branch: \`$BRANCH\`
             Autor: $AUTHOR
             $MESSAGE"

          elif [ "$EVENT" = "create" ]; then

            CONTENT=" **Neue ${{ github.event.ref_type }} erstellt**
            \`${{ github.event.ref }}\`
             ${{ github.actor }}"

          elif [ "$EVENT" = "delete" ]; then

            CONTENT=" **${{ github.event.ref_type }} gelöscht**
            \`${{ github.event.ref }}\`
             ${{ github.actor }}"

          elif [ "$EVENT" = "pull_request" ]; then

            CONTENT=" **Pull Request ${{ github.event.action }}**
             ${{ github.event.pull_request.title }}
             ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}
             ${{ github.actor }}"

          elif [ "$EVENT" = "release" ]; then

            CONTENT=" **Release veröffentlicht**
             ${{ github.event.release.tag_name }}
             ${{ github.event.release.name }}"

          fi

          jq -n --arg content "$CONTENT" \
            '{content: $content}' \
            | curl \
                -H "Content-Type: application/json" \
                -d @- \
                "$WEBHOOK"
