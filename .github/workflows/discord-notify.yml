name: Discord Notifications

on:
  push:
  create:
  delete:
  pull_request:
    types: [opened, closed, reopened]
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Notify Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "push" ]; then
            CONTENT="Commit

Branch: ${{ github.ref_name }}
Autor: ${{ github.actor }}
Nachricht: ${{ github.event.head_commit.message }}
Link: ${{ github.event.head_commit.url }}"

          elif [ "$EVENT" = "create" ]; then
            CONTENT="Branch erstellt

Name: ${{ github.event.ref }}
Autor: ${{ github.actor }}"

          elif [ "$EVENT" = "delete" ]; then
            CONTENT="Branch gelöscht

Name: ${{ github.event.ref }}
Autor: ${{ github.actor }}"

          elif [ "$EVENT" = "pull_request" ]; then
            CONTENT="Pull Request ${{ github.event.action }}

Titel: ${{ github.event.pull_request.title }}
Von: ${{ github.event.pull_request.head.ref }}
Nach: ${{ github.event.pull_request.base.ref }}
Autor: ${{ github.actor }}
Link: ${{ github.event.pull_request.html_url }}"

          elif [ "$EVENT" = "release" ]; then
            CONTENT="Release veröffentlicht

Tag: ${{ github.event.release.tag_name }}
Name: ${{ github.event.release.name }}
Link: ${{ github.event.release.html_url }}"
          fi

          jq -n --arg content "$CONTENT" \
            '{content: $content}' \
            | curl -H "Content-Type: application/json" \
                   -d @- \
                   "$WEBHOOK"
