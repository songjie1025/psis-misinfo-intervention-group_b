name: Discord Notifications

on:
  push:
  create:
  delete:
  pull_request:
    types: [opened, closed, reopened]
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Notify Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "push" ]; then

            COMMITS=$(jq -r '.commits[] | "- " + .message' "$GITHUB_EVENT_PATH")

            CONTENT="Push

Repository: ${{ github.repository }}
Branch: ${{ github.ref_name }}
Autor: ${{ github.actor }}

Commits:
$COMMITS"

          elif [ "$EVENT" = "create" ]; then

            CONTENT="Branch erstellt

Repository: ${{ github.repository }}
Name: ${{ github.event.ref }}
Autor: ${{ github.actor }}"

          elif [ "$EVENT" = "delete" ]; then

            CONTENT="Branch gelöscht

Repository: ${{ github.repository }}
Name: ${{ github.event.ref }}
Autor: ${{ github.actor }}"

          elif [ "$EVENT" = "pull_request" ]; then

            if [ "${{ github.event.action }}" = "closed" ] && [ "${{ github.event.pull_request.merged }}" = "true" ]; then
              STATUS="gemerged"
            elif [ "${{ github.event.action }}" = "closed" ]; then
              STATUS="geschlossen"
            else
              STATUS="${{ github.event.action }}"
            fi

            CONTENT="Pull Request $STATUS

Repository: ${{ github.repository }}
Titel: ${{ github.event.pull_request.title }}
Von: ${{ github.event.pull_request.head.ref }}
Nach: ${{ github.event.pull_request.base.ref }}
Autor: ${{ github.actor }}

Link:
${{ github.event.pull_request.html_url }}"

          elif [ "$EVENT" = "release" ]; then

            CONTENT="Release veröffentlicht

Repository: ${{ github.repository }}
Tag: ${{ github.event.release.tag_name }}
Name: ${{ github.event.release.name }}

Link:
${{ github.event.release.html_url }}"
          fi

          jq -n \
            --arg content "$CONTENT" \
            '{content: $content}' \
            | curl \
                -H "Content-Type: application/json" \
                -d @- \
                "$WEBHOOK"
