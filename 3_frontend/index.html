<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MisinfoFeed — Personalized Misinformation Intervention</title>

  <!--
    Dependencies loaded from CDN — no npm install needed:
      - React 18: UI components and state management
      - Babel standalone: compiles JSX in the browser (prototype only; use build tool in production)
      - Tailwind CSS: utility-first styling via CDN (no build step required)
  -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Custom styles for the Twitter-like feed */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #000000;
      color: #E7E9EA;
    }
    /* Intervention type 3: full-screen overlay */
    .intervention-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    /* Smooth transitions for intervention cards */
    .intervention-card {
      transition: all 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    The main application script.
    type="text/babel" tells Babel standalone to compile JSX on the fly.
    In production, you would pre-compile this — but for a prototype this is fine.
  -->
  <script type="text/babel" src="app.js"></script>
</body>
</html>
